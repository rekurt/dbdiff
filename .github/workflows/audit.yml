name: Security Audit

on:
  schedule:
    - cron: "0 0 * * 1" # Every Monday at midnight
  push:
    paths:
      - "Cargo.lock"
      - "Cargo.toml"

permissions:
  contents: read

jobs:
  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
